apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: hello-limit
  name: hello-limit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-limit
  strategy: {}
  template:
    metadata:
      labels:
        app: hello-limit
    spec:
      containers:
      - image: nginx:1.25
        name: hello-world-nginx
        resources:
          requests:  
            cpu: "1000m"
            memory: "20Mi"    
status: {}
